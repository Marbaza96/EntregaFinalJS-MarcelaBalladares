<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras | Glucon</title>

    <!-- LINK a CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <!--LINK a JS -->
    <script defer src="../js/carrito.js"></script>
</head>


<body>
    <header class="header">
        <!-- SECCION HEADER -->
        <section class="header-section">

            <!-- BANNER -->
            <a class="banner">
                <img src="../img/banner-glucon.png" alt="Banner de Glucon">
            </a>

            <!-- NAV MENU -->
            <div class="div-nav">

                <nav>
                    <ul>
                        <li>
                            <a href="../index.html">HOME</a>
                        </li>
                        <li>
                            <a href="./carrito.html">MI CARRITO</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </section>
    </header>

    <main id="main-cart">
        <!-- SECCION CARRITO -->

        <h1 class="page-title">CARRITO DE COMPRAS</h1>

        <section class="cart-section"></section>

        <!-- BTN "VOLVER A CATALOGO/HOME" Y BTN "VACIAR CARRITO"-->
        <div class="cart-btn">
            <a id="cart-btn-back" href="../index.html" type="button">Volver al Catálogo</a>
            <button id="cart-btn-empty" type="button">Vaciar carrito</button>

            <!-- TOTAL DEL CARRITO -->
            <p class="cart-total">
                Total: <span id="cart-total">0</span> UYU</p>
        </div>

        <!-- BTN "CONTINUAR CON LA COMPRA" -->
        <div id="checkout-container" class="checkout">
            <a href="./checkout.html">Continuar con la compra</a>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <div class="footer-left">
            <!-- ICONOS IZQ. - GOOGLE MAPS -->
            <a href="https://www.google.com/maps/place/Departamento+de+Montevideo/@-34.8195175,-56.5572206,10z/data=!3m1!4b1!4m6!3m5!1s0x959f80ffc63bf7d3:0x686fbde87255a664!8m2!3d-34.8181587!4d-56.2138256!16zL20vMDlwMmQ5?entry=ttu&g_ep=EgoyMDI2MDIyNC4wIKXMDSoASAFQAw%3D%3D"
                target="_blank">
                <img class="footer-icon" src="../img/icono-maps.png" alt="Icono de ubicación Google Maps">
            </a>
            <!-- ICONOS IZQ. - WP -->
            <a href="https://web.whatsapp.com/" target="_blank">
                <img class="footer-icon" src="../img/icono-wp.png" alt="Icono de WhatsApp">
            </a>
        </div>

        <!-- TEXTOS EN FOOTER -->
        <div class="footer-center">
            <p class="footer-text">Glucon - Suministros para diabéticos</p>
            <p class="footer-text">Copyright © 2026 Glucon. Todos los derechos reservados.</p>
        </div>

        <!-- ICONO "UP" EN FOOTER -->
        <div class="footer-right">
            <a href="#main-cart">
                <img src="../img/icono-up.png" alt="Icono de flecha hacia arriba para volver al inicio">
            </a>
        </div>

    </footer>

</body>

</html>
