<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras | Glucon</title>

    <!-- LINK a CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- LINK PARA TIPOGRAFÍAS PERSONALIZADAS -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <!--LINK a JS -->
    <script defer src="../js/carrito.js"></script>

</head>

<body id="top">

    <!-- HEADER - CARRITO -->
    <header class="header header-mini">
        <section class="section-banner section-banner-mini">

            <!-- BANNER -->
            <img class="banner-bg" src="../img/banner-glucon.svg" alt="Banner principal de Glucon">

            <!-- SLOGAN + LINEA EN BANNER -->
            <div class="banner-top banner-top-mini">
                <p class="banner-subtitle">SUMINISTROS PARA DIABÉTICOS</p>
                <div class="banner-line"></div>

                <!-- MENU DE NAVEGACION -->
                <div class="nav-icons">
                    <a href="../index.html">
                        <img src="../img/icono-home.svg" alt="Icono al inicio">
                    </a>
                    <a href="./carrito.html">
                        <img src="../img/icono-carrito.svg" alt="Icono al carrito">
                    </a>
                </div>
            </div>

            <!-- TITULO  -->
            <div class="banner-content banner-content-mini">
                <h1 class="banner-title banner-title-mini">GLUCON</h1>
            </div>

        </section>
    </header>

    <!-- MAIN - CARRITO -->

    <main id="main-cart" class="main-cart">

        <div class="cart-title-row">
            <!-- SUBTITULO DE PAGINA -->
            <h2 class="page-title">CARRITO DE COMPRAS</h2>

            <!-- FLECHA PARA IR HACIA ABAJO -->
            <a href="#cart-end" class="scroll-down">
                <img src="../img/icono-up.svg" alt="Ir al total">
            </a>
        </div>


        <!-- SECCION DE PRODUCTOS AGREGADOS DESDE JS -->
        <section class="cart-section"></section>

        <!-- BOTONES VOLVER/VACIAR Y TOTAL DEL CARRITO -->
        <div id="cart-end" class="cart-actions-box">

            <div class="cart-actions">
                <div class="cart-actions-left">
                    <a id="cart-btn-back" href="../index.html">Volver al catálogo</a>
                    <button id="cart-btn-empty" type="button">Vaciar carrito</button>
                </div>

                <!-- TOTAL -->
                <p class="cart-total">
                    Total: <span id="cart-total">0</span> UYU
                </p>
            </div>

            <!-- BOTON PARA CONTINUAR CON LA COMPRA -->
            <div id="checkout-container" class="checkout">
                <a href="./checkout.html">Continuar con la compra</a>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <!-- IZQUIERDA - REDES -->
        <div class="footer-left">
            <a href="https://maps.app.goo.gl/WPaTHEoxA23RPMyh6" target="_blank" aria-label="Ubicación">
                <img src="../img/icono-maps.png" alt="Ubicación">
            </a>
            <a href="https://web.whatsapp.com/" target="_blank" aria-label="WhatsApp">
                <img src="../img/icono-wp.png" alt="WhatsApp">
            </a>
        </div>

        <!-- CENTRO - TEXTO -->
        <div class="footer-center">
            <p>Glucon - Suministros para diabéticos</p>
            <p>© 2026 Glucon. Todos los derechos reservados.</p>
        </div>

        <!-- DERECHA - ICONOS HOME/CARRITO/UP -->
        <div class="footer-right">
            <a href="../index.html">
                <img src="../img/icono-home.svg" alt="Home">
            </a>
            <a href="./carrito.html">
                <img src="../img/icono-carrito.svg" alt="Carrito">
            </a>
            <a href="#top">
                <img src="../img/icono-up.svg" alt="Volver arriba">
            </a>
        </div>

    </footer>

</body>

</html>
