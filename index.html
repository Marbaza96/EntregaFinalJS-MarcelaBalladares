<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucon</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="./css/styles.css">

    <!-- LINK PARA TIPOGRAFÍAS PERSONALIZADAS -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <!-- LINK LIBRERÍA - SWEETALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- LINK LIBRERÍA - TOASTIFY -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!--LINK JS  -->
    <script defer src="./js/main.js"></script>

</head>

<body>
    <header class="header">
        <section class="section-banner">

            <!-- BANNER -->
            <img class="banner-bg" src="./img/banner-glucon.svg" alt="Banner principal de Glucon">

            <!-- CONTENIDO SOBRE BANNER -->
            <div class="banner-top">
                <p class="banner-subtitle">SUMINISTROS PARA DIABÉTICOS</p>
                <div class="banner-line"></div>

                <!-- MENU DE NAVEGACION -->
                <div class="nav-icons">
                    <a href="./index.html">
                        <img src="./img/icono-home.svg" alt="Icono al inicio">
                    </a>
                    <a href="./pages/carrito.html">
                        <img src="./img/icono-carrito.svg" alt="Icono al carrito">
                    </a>
                </div>
            </div>

            <!-- FLECHAS DECORATIVAS -->
            <div class="banner-arrows">
                <img src="./img/flechas-home.svg" alt="Flechas decorativas">
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="banner-content">
                <h1 class="banner-title">GLUCON</h1>
                <a class="banner-btn" href="#catalogo">VER CATÁLOGO</a>
            </div>

        </section>
    </header>

    <main id="main">
        <h2 id="catalogo" class="catalog-title">CATÁLOGO</h2>
        <div class="catalog-line"></div>

        <section id="products-container" class="section-products"></section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <!-- IZQUIERDA -->
        <div class="footer-left">
            <a href="#" aria-label="Ubicación">
                <img src="./img/icono-maps.png" alt="Ubicación">
            </a>
            <a href="#" aria-label="WhatsApp">
                <img src="./img/icono-wp.png" alt="WhatsApp">
            </a>
        </div>

        <!-- CENTRO -->
        <div class="footer-center">
            <p>Glucon - Suministros para diabéticos</p>
            <p>© 2026 Glucon. Todos los derechos reservados.</p>
        </div>

        <!-- DERECHA -->
        <div class="footer-right">
            <a href="./index.html">
                <img src="./img/icono-home.svg" alt="Home">
            </a>
            <a href="./pages/carrito.html">
                <img src="./img/icono-carrito.svg" alt="Carrito">
            </a>
            <a href="#top">
                <img src="./img/icono-up.svg" alt="Volver arriba">
            </a>
        </div>

    </footer>
</body>

</html>
